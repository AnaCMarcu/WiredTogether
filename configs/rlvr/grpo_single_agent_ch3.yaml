# GRPO single-agent training on Ch3 — Stage 2 first target.
# See docs/rlvr_grpo_plan.md §5.2.
#
# Launch:
#   cd src/mindforge
#   PYTHONPATH=../ python multi_agent_craftium_grpo.py \
#       --config ../../configs/rlvr/grpo_single_agent_ch3.yaml

env:
  num_agents: 3
  max_episode_steps: 1000
  obs_width: 320
  obs_height: 180
  chamber_subset: [ch3]
  # extra_kwargs: pass HPC-specific knobs (game dirs, server timeouts) here:
  # extra_kwargs:
  #   mt_listen_timeout: 300000

llm:
  # REQUIRED — set to the HuggingFace ID or local path of your base model.
  # The legacy stack typically uses a Qwen2.5 / Qwen3 family checkpoint.
  base_model_name: "REPLACE_ME"
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj"]
  policy_adapter: "grpo_policy"
  reference_adapter: "grpo_reference"
  device: "cuda"
  max_new_tokens: 256
  temperature: 1.0

policy:
  trained_agent: 0            # Stage-2: only agent 0 is trained
  checkpoint_path: null       # null = base LLM (plan default, clean comparison)

sampler:
  n_per_group: 4              # G
  horizon: 50                 # H — up-to-H with early termination
  position_bucket_size: 2.0   # 2-block grid for equivalence class
  max_resets_per_group: 1024

grpo:
  clip_epsilon: 0.2
  kl_coefficient: 0.05        # most sensitive hyperparameter — tune carefully
  learning_rate: 5.0e-6
  n_per_group: 4              # must match sampler.n_per_group
  total_steps: 1000
  checkpoint_interval: 100
  log_interval: 10
  grad_clip_norm: 1.0
  team_reward: false          # 3B per-agent (Stage 2 single-agent)

verifier:
  use_milestone_rewards: true
  use_format_reward: true
  format_reward_weight: 0.1   # per-step format × weight; total ~ 0.1·H at best
  use_alive_bonus: true
  alive_bonus_amount: 5.0
  hebbian_reward_diffusion: false   # Stage 4a toggle — off in Stage 2

hebbian:
  enabled: false              # Stage 4 enables this

seed: 0
checkpoint_dir: "runs/grpo_single_agent_ch3/grpo_lora"
log_dir: "runs/grpo_single_agent_ch3"
