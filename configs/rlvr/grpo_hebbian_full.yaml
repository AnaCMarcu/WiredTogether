# Stage 4 full Hebbian: reward diffusion (4a) + group composition (4b).
# Multi-agent (3 trained, 3B per-agent reward).
#
# Launch:
#   cd src/mindforge
#   PYTHONPATH=../ python multi_agent_craftium_grpo.py \
#       --config ../../configs/rlvr/grpo_hebbian_full.yaml
#
# Other Hebbian ablations:
#   grpo_hebbian_diffusion.yaml      — 4a only
#   grpo_hebbian_composition.yaml    — 4b only (Option 4b-i, clipped)

env:
  num_agents: 3
  max_episode_steps: 1000
  obs_width: 320
  obs_height: 180
  chamber_subset: [ch3]

llm:
  base_model_name: "REPLACE_ME"
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj"]
  policy_adapter: "grpo_policy"
  reference_adapter: "grpo_reference"
  device: "cuda"
  max_new_tokens: 256
  temperature: 1.0

policy:
  trained_agents: [0, 1, 2]
  checkpoint_path: null

sampler:
  n_per_group: 4
  horizon: 50
  position_bucket_size: 2.0
  max_resets_per_group: 1024

grpo:
  clip_epsilon: 0.2
  kl_coefficient: 0.05
  learning_rate: 5.0e-6
  n_per_group: 4
  total_steps: 1000
  checkpoint_interval: 100
  log_interval: 10
  grad_clip_norm: 1.0
  team_reward: false                      # 3B per-agent reward
  hebbian_group_composition: true         # Stage 4b
  hebbian_borrow_fraction: 0.25           # 25% of group from teammates
  hebbian_buffer_capacity: 64

verifier:
  use_milestone_rewards: true
  use_format_reward: true
  format_reward_weight: 0.1
  use_alive_bonus: true
  alive_bonus_amount: 5.0
  hebbian_reward_diffusion: true          # Stage 4a

hebbian:
  enabled: true
  num_agents: 3
  interaction_radius: 5.0
  engagement_reward_weight: 0.5
  communication_coactivity_bonus: 0.5
  ltp_lr: 0.01
  ltd_lr: 0.005
  ltd_threshold: 0.1
  base_ltp: 0.005
  decay: 0.0003
  modulation_beta: 1.0
  ltd_sustained_lr: 0.002
  failure_memory_window: 50
  social_replay_rho: 0.0                  # disabled — GRPO uses Stage-4b borrowing instead
  reward_diffusion_gamma: 0.2
  init_weight: 0.1
  log_graph_every: 50

seed: 0
checkpoint_dir: "runs/grpo_hebbian_full/grpo_lora"
log_dir: "runs/grpo_hebbian_full"
